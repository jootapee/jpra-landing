<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #f0f0f0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }
        .previews {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 600px;
        }
        .preview {
            background: white;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .preview h3 {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .dark {
            background: #1E3A5F;
        }
        .dark h3 {
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="previews">
        <div class="preview">
            <h3>Fundo Claro (usado em footer)</h3>
            <img src="logo.svg" alt="JPRA Advogados" style="width: 280px;">
        </div>
        <div class="preview dark">
            <h3>Fundo Escuro (navbar + hero)</h3>
            <img src="logo-white.svg" alt="JPRA Advogados" style="width: 280px;">
        </div>
    </div>
</body>
</html>
